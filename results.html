<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЭМО - тренажёр</title>
    <link rel="shortcut icon" href="assets/images/design/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="assets/styles/trainer.css">
    <link rel="stylesheet" href="assets/styles/table_results.css">
</head>

<body>
    <div class="trainer-wrapper">
        <div class="white-body-field">

            <table class="table-results">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>КАРТИНКА</th>
                        <th>ПРАВИЛЬНЫЙ ОТВЕТ</th>
                        <th>ТВОЙ ОТВЕТ</th>
                        <th>РЕЗУЛЬТАТ</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td><img src="assets/images/green.svg" alt="ЗЕЛЕНЬ"></td>
                        <td>ЗЕЛЕНЬ</td>
                        <td>ЗЕЛЕНЬ</td>
                        <td><img src="assets/images/design/tick.svg" class="result-img" alt="Верно"></td>
                    </tr>

                    <tr>
                        <td>2</td>
                        <td><img src="assets/images/ashan.svg" alt="АШАН"></td>
                        <td>АШААН</td>
                        <td>АШАН</td>
                        <td><img src="assets/images/design/cross.svg" class="result-img" alt="Неверно"></td>
                    </tr>

                    <tr>
                        <td>3</td>
                        <td><img src="assets/images/tyumen.svg" alt="ТЮМЕНЬ"></td>
                        <td>ТЮМЕНЬ</td>
                        <td>ТЮМЕНЬ</td>
                        <td><img src="assets/images/design/tick.svg" class="result-img" alt="Неверно"></td>
                    </tr>

                    <tr>
                        <td>4</td>
                        <td><img src="assets/images/roller.svg" alt="КАТОК"></td>
                        <td>КАТОК</td>
                        <td>КАТОК</td>
                        <td><img src="assets/images/design/tick.svg" class="result-img" alt="Верно"></td>
                    </tr>

                    <tr>
                        <td>5</td>
                        <td><img src="assets/images/ice_rink.svg" alt="КАТОК"></td>
                        <td>КАТОК</td>
                        <td>КАТОК</td>
                        <td><img src="assets/images/design/tick.svg" class="result-img" alt="Верно"></td>
                    </tr>
                </tbody>
            </table>

        </div>
    </div>
</body>

</html>
