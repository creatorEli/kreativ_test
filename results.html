<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЭМО - тренажёр</title>
    <link rel="shortcut icon" href="assets/images/design/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="assets/styles/trainer.css">
    <link rel="stylesheet" href="assets/styles/table_results.css">
</head>

<body>
    <div class="trainer-wrapper">
        <div class="white-body-field">
            <div class="cross-btn" onclick="openTrainer()">
                <img src="assets/images/design/cross.svg" alt="Перезапустить">
            </div>
            <table class="table-results">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>К<span style="color: red;">А</span>РТ<span style="color: red;">И</span>НК<span
                                style="color: red;">А</span>
                        </th>
                        <th>ПР<span style="color: red;">А</span>В<span style="color: red;">И</span>ЛЬН<span
                                style="color: red;">Ы</span>Й
                            <span style="color: red;"> О</span>ТВ<span style="color: red;">Е</span>Т
                        </th>
                        <th>ТВ<span style="color: red;">О</span>Й <span style="color: red;">О</span>ТВ<span
                                style="color: red;">Е</span>Т
                        </th>
                        <th>Р<span style="color: red;">Е</span>З<span style="color: red;">У</span>ЛЬТ<span
                                style="color: red;">А</span>Т
                        </th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td><img src="assets/images/green.svg" alt="ЗЕЛЕНЬ"></td>
                        <td>З<span style="color: red;"> Е</span>Л<span style="color: red;"> Е</span>НЬ</td>
                        <td>З<span style="color: red;"> Е</span>Л<span style="color: red;"> Е</span>НЬ</td>
                        <td><img src="assets/images/design/tick.svg" class="result-img" alt="Верно"></td>
                    </tr>

                    <tr>
                        <td>2</td>
                        <td><img src="assets/images/ashan.svg" alt="АШАН"></td>
                        <td><span style="color: red;"> А</span>Ш<span style="color: red;"> АА</span>Н</td>
                        <td><span style="color: red;"> А</span>Ш<span style="color: red;"> А</span>Н</td>
                        <td><img src="assets/images/design/cross.svg" class="result-img" alt="Неверно"></td>
                    </tr>

                    <tr>
                        <td>3</td>
                        <td><img src="assets/images/tyumen.svg" alt="ТЮМЕНЬ"></td>
                        <td>Т<span style="color: red;"> Ю</span>М<span style="color: red;"> Е</span>НЬ</td>
                        <td>Т<span style="color: red;"> Ю</span>М<span style="color: red;"> Е</span>НЬ</td>
                        <td><img src="assets/images/design/tick.svg" class="result-img" alt="Неверно"></td>
                    </tr>

                    <tr>
                        <td>4</td>
                        <td><img src="assets/images/roller.svg" alt="КАТОК"></td>
                        <td>К<span style="color: red;"> А</span>Т<span style="color: red;"> О</span>К</td>
                        <td>К<span style="color: red;"> А</span>Т<span style="color: red;"> О</span>К</td>
                        <td><img src="assets/images/design/tick.svg" class="result-img" alt="Верно"></td>
                    </tr>

                    <tr>
                        <td>5</td>
                        <td><img src="assets/images/ice_rink.svg" alt="КАТОК"></td>
                        <td>К<span style="color: red;"> А</span>Т<span style="color: red;"> О</span>К</td>
                        <td>К<span style="color: red;"> А</span>Т<span style="color: red;"> О</span>К</td>
                        <td><img src="assets/images/design/tick.svg" class="result-img" alt="Верно"></td>
                    </tr>
                </tbody>
            </table>

        </div>
    </div>

    <script src="assets/scripts/result.js"></script>
</body>

</html>
