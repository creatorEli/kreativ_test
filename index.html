<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЭМО - тренажёр</title>
    <link rel="shortcut icon" href="assets/images/design/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="assets/styles/trainer.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <div class="trainer-wrapper">
        <div class="navigation-menu">
            <button class="completed-nav-btn">
                1
            </button>
            <button class="completed-nav-btn">
                2
            </button>
            <button class="active-nav-btn">
                3
            </button>
            <button>
                4
            </button>
            <button>
                5
            </button>
            <button>
                6
            </button>
        </div>

        <div class="cross-btn" onclick="resetTrainer()">
            <img src="assets/images/design/cross.svg" alt="Перезапустить">
        </div>

        <div class="white-body-field">
            <div class="form-trainer">
                <div class="trainer-image">
                    <img src="assets/images/tyumen.svg" id="trainerImage" alt="Тюмень">
                </div>
                <div class="trainer-form">
                    <label class="trainer-text">Напечатай <span id="labelWord">Тюмень</span></label>
                    <div class="input-button-field">
                        <input type="text" class="text-field">
                        <button type="button" class="check-button">
                            <img src="assets/images/design/tick_invalid.svg" alt="Проверить">
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="assets/scripts/script.js"></script>
</body>

</html>
